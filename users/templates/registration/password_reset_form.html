{% extends "base.html" %}

{% block title %}Reset hasła{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Reset hasła</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success" type="submit">Wyślij link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
