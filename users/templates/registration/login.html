{% extends "base.html" %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Logowanie</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success" type="submit">Zaloguj</button>
                </form>
                <a class="d-inline-block mt-3" href="{% url 'password_reset' %}">Nie pamiętasz hasła?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
